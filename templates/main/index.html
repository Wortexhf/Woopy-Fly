{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woopy Fly</title>
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="hdr">
    <a class="logo">
      <img src="{% static 'main/img/logo_woopyfly.png' %}" class="logo-img" alt="Logo">
      <span>Woopy Fly</span>
    </a>
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5 14 14"/></svg>
      <input class="search-input" type="search" placeholder="Пошук треків, виконавців…">
    </div>
    <button id="upload-track-btn" class="btn-upload" title="Додати трек">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      Додати
    </button>
    <img src="{% static 'main/img/avatar.jpg' %}" class="avatar" alt="Avatar">
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section"><div class="sidebar-label">Menu</div></div>
    <div class="nav-item active">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2L2 7v7h4v-4h4v4h4V7z"/></svg>
      Home
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v1.5H2zm0 4h12v1.5H2zm0 4h7v1.5H2z"/></svg>
      Library
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2 4 5 .7-3.5 3.4.8 4.9L8 12l-4.3 2 .8-4.9L1 5.7 6 5z"/></svg>
      Liked
    </div>
    <div class="sidebar-divider"></div>
    <div style="padding:0 16px;margin-bottom:10px"><div class="sidebar-label">Playlists</div></div>
    <div class="playlist-list"></div>
    <div class="btn-new">+ New playlist</div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="home-view">
      <div class="section-title">Всі треки</div>
      <div class="track-list" id="recent-list">
        <p style="color:var(--text3);font-size:13px">Завантажте перший трек…</p>
      </div>
    </div>
    <div id="search-view" style="display:none"></div>
  </main>

  <!-- NOW PLAYING -->
  <aside class="now-panel">
    <div id="embed-container" style="display:none"></div>
    <div class="now-cover" id="now-cover">🎧</div>
    <div class="now-title" id="now-title">Nothing playing</div>
    <div class="now-artist" id="now-artist">—</div>
    <div class="now-likes">
      <button class="heart-btn" id="heart-btn" onclick="toggleLike()">♥</button>
    </div>
    <div class="queue-label">Up next</div>
    <div class="queue-list"></div>
  </aside>

  <!-- PLAYER BAR -->
  <div class="player-bar">
    <div class="pb-track">
      <div class="pb-cover" id="pb-cover">🎧</div>
      <div class="pb-info">
        <p id="pb-title">Nothing playing</p>
        <span id="pb-artist">—</span>
      </div>
      <button class="pb-like" id="pb-like" onclick="toggleLike()">♥</button>
    </div>
    <div class="pb-controls">
      <div class="pb-btns">
        <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 3h5v5M4 20 21 3M16 21h5v-5M4 4l5 5"/></svg>
        </button>
        <button class="ctrl-btn" onclick="prevTrack()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg viewBox="0 0 24 24"><path id="play-icon" d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" onclick="toggleRepeat()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="pb-progress">
        <span class="time" id="time-cur">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0">
        <span class="time right" id="time-tot">0:00</span>
      </div>
    </div>
    <div class="pb-vol">
      <button class="vol-btn" id="vol-btn" onclick="toggleMute()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </button>
      <input type="range" id="volume" min="0" max="100" value="80" style="width:80px">
    </div>
  </div>
</div>

<!-- ════ MODAL: Upload ════ -->
<div class="modal-overlay" id="upload-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Додати трек</h3>
      <button class="modal-close" onclick="closeModal('upload-modal')">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-file">📁 MP3 файл</button>
      <button class="modal-tab" id="tab-external">🔗 SoundCloud</button>
    </div>

    <!-- Tab: File -->
    <div id="form-file">
      <form id="upload-file-form" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
          <label>Назва треку *</label>
          <input type="text" name="title" class="form-input" placeholder="Назва" required>
        </div>
        <div class="form-group">
          <label>Виконавець</label>
          <input type="text" name="artist" class="form-input" placeholder="Виконавець">
        </div>
        <div class="form-group">
          <label>MP3 файл *</label>
          <input type="file" name="audio_file" class="form-input" accept="audio/*" required>
        </div>
        <div class="form-group">
          <label>Обкладинка (необов'язково)</label>
          <input type="file" name="cover_file" class="form-input" accept="image/*">
        </div>
        <button type="submit" class="btn-primary">Завантажити</button>
      </form>
    </div>

    <!-- Tab: SoundCloud -->
    <div id="form-external" style="display:none">
      <form id="upload-external-form">
        {% csrf_token %}
        <div class="form-group">
          <label>Назва треку *</label>
          <input type="text" id="ext-title" class="form-input" placeholder="Назва" required>
        </div>
        <div class="form-group">
          <label>Виконавець</label>
          <input type="text" id="ext-artist" class="form-input" placeholder="Виконавець">
        </div>
        <div class="form-group">
          <label>SoundCloud посилання *</label>
          <input type="url" id="ext-url" class="form-input" placeholder="https://soundcloud.com/..." required>
        </div>
        <div class="form-group">
          <label>Обкладинка (необов'язково)</label>
          <input type="file" id="ext-cover-file" class="form-input" accept="image/*">
        </div>
        <button type="submit" class="btn-primary">Додати трек</button>
      </form>
    </div>
  </div>
</div>

<!-- ════ MODAL: New Playlist ════ -->
<div class="modal-overlay" id="new-playlist-modal" style="display:none">
  <div class="modal" style="max-width:340px">
    <div class="modal-header">
      <h3>Новий плейлист</h3>
      <button class="modal-close" onclick="closeModal('new-playlist-modal')">✕</button>
    </div>
    <form id="new-playlist-form">
      {% csrf_token %}
      <div class="form-group">
        <label>Назва *</label>
        <input type="text" id="pl-name-input" class="form-input" placeholder="Назва плейлиста" required>
      </div>
      <div class="form-group">
        <label>Емодзі</label>
        <input type="text" id="pl-emoji-input" class="form-input" placeholder="🎵" maxlength="4">
      </div>
      <button type="submit" class="btn-primary">Створити</button>
    </form>
  </div>
</div>

<!-- ════ MODAL: Add to Playlist ════ -->
<div class="modal-overlay" id="playlist-pick-modal" style="display:none">
  <div class="modal" style="max-width:320px">
    <div class="modal-header">
      <h3>Додати до плейлиста</h3>
      <button class="modal-close" onclick="closeModal('playlist-pick-modal')">✕</button>
    </div>
    <div class="modal-pl-list" style="max-height:300px;overflow-y:auto"></div>
  </div>
</div>

<script src="{% static 'main/js/config.js' %}"></script>
<script src="{% static 'main/js/script.js' %}"></script>
</body>
</html>
